dataset:
  name: celeba256
  root: data/celeba256
  image_size: 256

latents:
  output_dir: data/latents

vae:
  checkpoint_id: stabilityai/sd-vae-ft-mse
  local_checkpoint: checkpoints/sd-vae-ft-mse
  cache_dir: .cache/huggingface
  dtype: fp16
  device: cuda

micro_latent:
  residual_shape: [4, 32, 32]
  patch_size: 2
  patch_grid: [16, 16]
  num_patches: 256
  patch_dim: 16

rama_bases:
  cache_path: cache/rama_bases_p256_d16.pt
  num_patches: 256
  patch_dim: 16
  seed: 1234

rama:
  bases_path: cache/rama_bases_p256_d16.pt
  patch_size: 2
  num_patches: 256
  patch_dim: 16

tokenizer:
  config_path: cache/rama_tokenizer_config.pt
  num_bins: 256
  bound: 3.0
  bound_method: percentile_abs_y
  percentile: 99.5

context_encoder:
  in_channels: 4
  context_dim: 256
  hidden_channels: 128
  num_layers: 3
  positional_embedding: true
  grid_size: [16, 16]
  context_noise_sigma: 0.03

micro:
  type: categorical
  context_dim: 256
  patch_dim: 16
  dim_emb_dim: 64
  hidden_dim: 512
  num_layers: 4
  num_bins: 256
  loss: cross_entropy

micro_rama_net:
  type: categorical
  context_dim: 256
  patch_dim: 16
  dim_emb_dim: 64
  hidden_dim: 512
  num_layers: 4
  num_bins: 256

micro_continuous:
  type: nflows
  enabled: false
  context_dim: 256
  patch_dim: 16
  dim_emb_dim: 64
  hidden_dim: 512
  num_layers: 4
  spline_bins: 16
  tail_bound: 3.0
  loss: negative_log_likelihood

training:
  batch_size_per_gpu: 64
  num_gpus: 2
  gradient_accumulation_steps: 1
  optimizer: AdamW
  learning_rate: 2.0e-4
  betas: [0.9, 0.999]
  weight_decay: 1.0e-4
  precision: fp16
  total_steps: 200000
  grad_clip: 1.0

logging:
  tracker: wandb
  project: rama
  entity: null
  run_name: celeba256-sdvae-micro-rama
  log_every_steps: 100
  checkpoint_every_steps: 10000

evaluation:
  fid_every_steps: 10000
  fid_num_samples: 1024
  fid_batch_size: 32
  temperature: 1.0
  use_argmax: false
