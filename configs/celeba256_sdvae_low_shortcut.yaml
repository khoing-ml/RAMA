dataset:
  name: celeba256
  root: data/celeba256
  image_size: 256
  channels: 3
  normalization: [-1, 1]

vae:
  checkpoint_id: stabilityai/sd-vae-ft-mse
  local_checkpoint: checkpoints/sd-vae-ft-mse
  cache_dir: .cache/huggingface
  dtype: bf16
  device: cuda

latents:
  output_dir: /content/drive/MyDrive/RAMA/latents_256/data/latents
  cache_dtype: bf16
  component: z_L

decomposition:
  macro_downsample_factor: 2
  downsample_mode: avg_pool
  upsample_mode: bicubic
  align_corners: false

macro_flow_model:
  architecture: dit
  variant: DiT-S/2
  input_shape: [4, 16, 16]
  patch_size: 2
  hidden_size: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4
  dropout: 0.0
  time_embedding_dim: 384
  objective: shortcut
  condition_on_dt: true
  num_classes: 1            # 1 = no class conditioning (unconditional)
  class_dropout_prob: 1.0   # 1.0 = always drop class label → unconditional generation
  cfg_scale: 0.0            # 0.0 = disabled; >1.0 enables classifier-free guidance

shortcut:
  denoise_timesteps: 128
  bootstrap_every: 4       # 1/N of batch → bootstrap; 2 = 50% (paper default)
  bootstrap_dt_bias: 0.0
  clip_intermediate: 4.0
  bootstrap_loss_weight: 1.0  # loss = loss_flow + w * loss_bootstrap; 1.0 = equal weight per sample

output:
  dir: /content/drive/MyDrive/RAMA/outputs  # checkpoints saved under {dir}/checkpoints/
  resume: null                                 # set to a checkpoint path to resume training

training:
  batch_size_per_gpu: 256
  num_gpus: 1
  global_batch_size: 256
  gradient_accumulation_steps: 1
  optimizer: AdamW
  learning_rate: 2.0e-4
  weight_decay: 0
  precision: bf16
  ema: true
  ema_decay: 0.9999
  total_steps: 401000

logging:
  tracker: wandb
  project: rama
  entity: null
  run_name: celeba256-sdvae-low-shortcut
  log_every_steps: 100
  sample_every_steps: 2000
  checkpoint_every_steps: 10000
  watch_model: false

evaluation:
  fid_every_steps: 10000
  fid_num_samples: 5000
  fid_batch_size: 64
  fid_stats: /content/drive/MyDrive/RAMA/fid_stats_celeba256_5k.pt  # path to pre-computed real FID stats (.npz or .pt)
  sampler: shortcut
  sampler_steps: [1, 4, 128]   # evaluate FID and log sample images at each step count
  num_sample_images: 16        # images logged to wandb per step count
  full_latent_size: 32
