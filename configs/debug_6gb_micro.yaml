dataset:
  name: debug_micro_latents

latents:
  output_dir: data/debug_micro_latents

micro_latent:
  residual_shape: [4, 32, 32]
  patch_size: 4
  patch_grid: [16, 16]
  num_patches: 256
  patch_dim: 16

rama_bases:
  cache_path: cache/rama_bases_p256_d16.pt
  num_patches: 256
  patch_dim: 16
  seed: 1234

rama:
  bases_path: cache/rama_bases_p256_d16.pt
  patch_size: 4
  num_patches: 256
  patch_dim: 16

tokenizer:
  config_path: cache/rama_tokenizer_config.pt
  num_bins: 256
  bound: 3.0
  bound_method: percentile_abs_y
  percentile: 99.5

context_encoder:
  architecture: conv
  in_channels: 4
  context_dim: 64
  hidden_channels: 64
  num_layers: 2
  vit_layers: 2
  vit_heads: 4
  vit_mlp_ratio: 4
  dropout: 0.0
  positional_embedding: true
  grid_size: [16, 16]
  context_noise_sigma: 0.0

micro:
  type: categorical
  context_dim: 64
  patch_dim: 16
  dim_emb_dim: 32
  hidden_dim: 128
  num_layers: 2
  num_bins: 256
  loss: cross_entropy

micro_rama_net:
  type: categorical
  context_dim: 64
  patch_dim: 16
  dim_emb_dim: 32
  hidden_dim: 128
  num_layers: 2
  num_bins: 256

micro_continuous:
  type: nflows
  enabled: false
  context_dim: 64
  patch_dim: 16
  dim_emb_dim: 32
  hidden_dim: 128
  num_layers: 2
  spline_bins: 8
  tail_bound: 3.0
  loss: negative_log_likelihood

training:
  batch_size_per_gpu: 2
  gradient_accumulation_steps: 1
  optimizer: AdamW
  learning_rate: 2.0e-4
  betas: [0.9, 0.999]
  weight_decay: 1.0e-4
  precision: fp16
  total_steps: 10
  grad_clip: 1.0

logging:
  tracker: null
  log_every_steps: 1
  checkpoint_every_steps: 10

evaluation:
  fid_every_steps: 0
  fid_num_samples: 8
  fid_batch_size: 2
  temperature: 1.0
  use_argmax: false
